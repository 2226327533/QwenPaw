# QwenPaw Cross-Platform Binary Build (Matrix Strategy)
# 三平台并行构建二进制产物 + Artifact 上传
# 适配 https://github.com/agentscope-ai/QwenPaw 仓库结构

name: QwenPaw Cross-Platform Binary Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  build-binary:
    name: Build Binary — ${{ matrix.os_label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_label: Linux x64
            artifact_name: qwenpaw-linux-x64
            binary_name: qwenpaw
            pyinstaller_extra: ""

          - os: macos-latest
            os_label: macOS ARM64
            artifact_name: qwenpaw-macos-arm64
            binary_name: qwenpaw
            pyinstaller_extra: "--target-arch arm64"

          - os: windows-latest
            os_label: Windows x64
            artifact_name: qwenpaw-windows-x64
            binary_name: qwenpaw.exe
            pyinstaller_extra: ""

    steps:
      # ──────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ──────────────────────────────────────
      # 2. Frontend: Build Console
      # ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Build console frontend
        shell: bash
        run: cd console && npm ci && npm run build

      - name: Copy console build into package
        shell: bash
        run: |
          rm -rf src/qwenpaw/console/*
          mkdir -p src/qwenpaw/console
          cp -R console/dist/* src/qwenpaw/console/

      # ──────────────────────────────────────
      # 3. Python Setup & Install
      # ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install QwenPaw and PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install pyinstaller==6.*

      # ──────────────────────────────────────
      # 4. Build Binary with PyInstaller
      # ──────────────────────────────────────
      - name: Build binary with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name qwenpaw \
            --console \
            --collect-all qwenpaw \
            --hidden-import qwenpaw.cli.main \
            --hidden-import qwenpaw.app \
            --hidden-import qwenpaw.agents \
            --hidden-import reme_ai \
            --hidden-import matrix_nio \
            --hidden-import agentscope \
            ${{ matrix.pyinstaller_extra }} \
            freeze_entry.py

      # ──────────────────────────────────────
      # 5. Verify Binary
      # ──────────────────────────────────────
      - name: Verify binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ls -lh dist/${{ matrix.binary_name }}
          file dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          ./dist/${{ matrix.binary_name }} --version || echo "Version check done"

      - name: Verify binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Item dist\${{ matrix.binary_name }} | Select-Object Name, Length
          .\dist\${{ matrix.binary_name }} --version

      # ──────────────────────────────────────
      # 6. Upload Artifact
      # ──────────────────────────────────────
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}
          retention-days: 30
          if-no-files-found: error

      # ──────────────────────────────────────
      # 7. Build Summary
      # ──────────────────────────────────────
      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ matrix.os_label }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Binary**: ${{ matrix.binary_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact**: ${{ matrix.artifact_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────
  # Release (only on tag push)
  # ──────────────────────────────────────
  release:
    name: Create Release
    needs: build-binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Package artifacts
        run: |
          cd release-assets
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done
          ls -lh ../*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
