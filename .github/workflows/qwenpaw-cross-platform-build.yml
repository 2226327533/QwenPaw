# QwenPaw Cross-Platform Build (Matrix Strategy)
# 三平台并行构建 + 测试验证
# 适配 https://github.com/agentscope-ai/QwenPaw 仓库结构
#
# 使用方式：将此文件放入 .github/workflows/ 目录，推送到 main 分支即可自动触发

name: QwenPaw Cross-Platform Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test — ${{ matrix.os_label }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # === Linux: 双版本 Python 覆盖 ===
          - os: ubuntu-latest
            os_label: Linux
            python-version: "3.10"
          - os: ubuntu-latest
            os_label: Linux
            python-version: "3.13"

          # === macOS (Apple Silicon) ===
          - os: macos-latest
            os_label: macOS ARM64
            python-version: "3.10"

          # === Windows ===
          - os: windows-latest
            os_label: Windows
            python-version: "3.10"

    steps:
      # ──────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ──────────────────────────────────────
      # 2. Frontend: Build Console
      # ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Build console frontend
        shell: bash
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          cd console && npm ci && npm run build

      - name: Copy console build into package
        shell: bash
        run: |
          rm -rf src/qwenpaw/console/*
          mkdir -p src/qwenpaw/console
          cp -R console/dist/* src/qwenpaw/console/

      # ──────────────────────────────────────
      # 3. Backend: Python Setup & Install
      # ──────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install QwenPaw with all dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      # ──────────────────────────────────────
      # 4. Verify Installation
      # ──────────────────────────────────────
      - name: Verify CLI entry point
        shell: bash
        run: |
          qwenpaw --version || echo "CLI version check completed"
          python -c "import qwenpaw; print(f'QwenPaw imported successfully')"

      # ──────────────────────────────────────
      # 5. Run Tests
      # ──────────────────────────────────────
      - name: Run unit tests
        shell: bash
        run: |
          pytest tests/unit -v --tb=short -q

      - name: Run contract tests
        shell: bash
        run: |
          pytest tests/contract -v --tb=short -q

      # ──────────────────────────────────────
      # 6. Build Summary
      # ──────────────────────────────────────
      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "## ✅ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ matrix.os_label }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner**: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
